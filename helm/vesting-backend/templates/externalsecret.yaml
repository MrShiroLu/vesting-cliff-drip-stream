{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "vesting-backend.fullname" . }}
  labels:
    {{- include "vesting-backend.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreRef.name }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind }}
  target:
    name: {{ include "vesting-backend.fullname" . }}
    creationPolicy: Owner
  data:
    {{- range $envKey, $remote := .Values.externalSecrets.remoteSecrets }}
    - secretKey: {{ $envKey }}
      remoteRef:
        key: {{ $remote.remoteKey }}
        {{- if $remote.property }}
        property: {{ $remote.property }}
        {{- end }}
    {{- end }}
{{- end }}
