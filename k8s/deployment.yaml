apiVersion: apps/v1
kind: Deployment
metadata:
  name: vesting-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vesting-backend
  template:
    metadata:
      labels:
        app: vesting-backend
    spec:
      containers:
        - name: vesting-backend
          image: vesting-backend:latest
          ports:
            - containerPort: 3001
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          env:
            - name: PORT
              value: "3001"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: vesting-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: vesting-secrets
                  key: redis-url
