<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VestingStream — Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #f9fafb;
      color: #111827;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 0.75rem;
      padding: 2rem;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
    h1 { font-size: 1.25rem; margin-bottom: 0.5rem; }
    p { color: #6b7280; font-size: 0.9rem; margin-bottom: 1.5rem; }
    button {
      background: #1d6ae5;
      color: #fff;
      border: none;
      padding: 0.6rem 1.5rem;
      border-radius: 0.5rem;
      font-size: 0.95rem;
      cursor: pointer;
    }
    button:hover { background: #1558cc; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon" aria-hidden="true">📡</div>
    <h1>You're offline</h1>
    <p>VestingStream needs an internet connection to interact with the Stellar network. Please check your connection and try again.</p>
    <button onclick="window.location.reload()">Retry</button>
  </div>
</body>
</html>
